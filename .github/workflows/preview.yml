name: Preview build (Pull Request)

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cf-pages-preview-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      deployments: write
    env:
      CLOUDFLARE_ACCOUNT_ID: d049abd61b495250aac07f7b39df1526
      PROJECT_NAME: flarial-api-site
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Publish preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: pages deploy out --project-name=${{ env.PROJECT_NAME }} --branch=pr-${{ github.event.pull_request.number }} --commit-dirty=true
